[general]
	#是否在 JEI 物品面板中隐藏锻造纹饰模板。
	#默认: true
	hideTemplateItems = true
	#是否在 JEI 用途界面中隐藏锻造纹饰配方。
	#默认: true
	hideTrimRecipes = true

[overrides]
	#注意：如果在游戏运行期间修改以下列表，JEI 搜索栏和锻造配方会立即刷新和隐藏，
	#      但是 Info 说明信息页必须重新进入存档（或重新连接服务器）才会生效。
	# 
	#=== 白名单 ===
	#此列表中的物品将被豁免，不执行隐藏逻辑。
	#用于单独保留某几个纹饰模板的配方显示。
	#填写格式: ["modid:item_name"]
	whitelist = []
	#=== 自定义纹饰目标 ===
	#本模组默认通过物品标签 minecraft:trim_templates 自动识别纹饰。
	#对于未添加规范标签的第三方模组，你可以将目标填入此处扩大筛选范围。
	#支持两种填写格式：
	#1. 精确匹配：填写 ["modid:item_name"]，只针对特定物品执行隐藏并添加说明。
	#2. 范围匹配：仅填写 ["modid"]，此时该模组下的【所有物品】（包括无关的方块、矿物等）
	#   都会被判定为纹饰模板。除非确认该模组只添加了纹饰，否则请谨慎使用。
	customTrims = []
