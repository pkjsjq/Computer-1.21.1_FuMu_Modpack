[datapack]
	#数据包设置
	#NONE: Disable all datapacks except soup
	#NONE: 不启用数据兼容
	#COMPAT: Extensive compatibility with other mod items
	#COMPAT: 与其他模组物品与配方提供大量兼容
	#UNITE: Duplicate items of the unified module
	#UNITE: 统一与其它模组重复的物品
	#Allowed Values: NONE, COMPAT, UNITE
	mode = "COMPAT"
	#Enable soup base material
	#是否启用汤锅材质拓展
	soup_enabled = true

	#森罗物语：厨房
	[kitchen.millstone]
		#石磨
		#Whether millstone item stacking is enabled
		#是否启用石磨输入限制突破
		#When enabled, you can add more items of the same type while the millstone is working
		#当启用时，部分功能可以在石磨工作时添加同类型的物品进行堆叠
		stacking_enabled = true

	[kitchen.lunch_bag]
		#嬗变饭袋
		#Whether the lunch bag blacklist is enabled
		#是否启用嬗变饭袋物品黑名单
		blacklist_enabled = true
		#List of item IDs that cannot be put into the Transmutation Lunch Bag
		#黑名单物品
		#Format: modid:item_id (e.g., artifacts:everlasting_beef, minecraft:apple)
		blacklist = ["artifacts:eternal_steak", "kaleidoscope_nether:everlasting_flame_steak"]
		#Whether the modified Transmutation Lunch Bag behavior is enabled
		#是否启用嬗变饭袋回调
		#When enabled, the lunch bag will only consume the first food item but apply all effects from all items in the bag
		#When disabled, the original Kaleidoscope Cookery behavior will be used
		back_behavior_enabled = false
		#Whether AppleSkin mod compatibility is enabled
		#是否启用苹果皮和嬗变饭袋的兼容
		appleskin_compat_enabled = true

	[kitchen.scarecrow]
		#稻草人
		#Whether scarecrows can repel phantoms
		#稻草人是否可以驱散幻翼
		#When enabled, phantoms will avoid areas near scarecrows with heads
		repel_phantoms = true

	[kitchen.effect]
		#效果设置
		#Whether Nourishment effect is blocked when player has Satiated Shield
		#是否启用滋养和饱腹代偿修复
		#When enabled, FarmersDelight's Nourishment effect will not work if player has Satiated Shield effect
		block_enabled = true

		[kitchen.effect.projectile_dodge]
			#弹射闪避
			#Whether projectile dodge teleport is enabled
			#是否启用弹射闪避的传送
			#When enabled, players with Projectile Dodge effect will teleport when hit by projectiles
			#When disabled, projectiles will be cancelled without teleportation
			teleport_enabled = false
			#Duration cost per dodge (in ticks)
			#每次闪避消耗的持续时间（tick）
			#Default: 200 ticks (10 seconds)
			# Default: 200
			# Range: > 1
			duration_cost = 200

		[kitchen.effect.vitality]
			#生机
			#List of entity IDs that cannot be affected by Vitality effect
			#生机效果黑名单实体ID
			#Format: modid:entity_id (e.g., minecraft:zombie, minecraft:villager)
			blacklist = []

[farmersdelight]
	#农夫乐事
	#Whether all FarmersDelight cooking pot recipes are disabled
	#是否禁用农夫乐事厨锅配方
	#When enabled, all cooking pot recipes will not work
	cooking_pot_recipes_disabled = false
	#Whether the FarmersDelight cooking pot GUI is disabled
	#是否禁用农夫乐事厨锅
	#When enabled, the cooking pot GUI will not open
	cooking_pot_gui_disabled = false
	#Whether all FarmersDelight cutting board recipes are disabled
	#是否禁用农夫乐事砧板配方
	#When enabled, all cutting board recipes will not work
	cutting_board_recipes_disabled = false
	#Whether rich soil hoe tilling is enabled
	#是否启用水中锄耕农夫乐事沃土功能
	#When enabled, right-clicking rich soil with water above will turn it into rich soil farmland
	hoe_enabled = true

[youkaisfeasts]
	#幻想乡乐事
	#Whether all Youkai's Homecoming steaming recipes are disabled
	#是否禁用妖怪归家蒸笼配方
	#When enabled, all steaming recipes will not work
	steaming_recipes_disabled = false

[farm_and_charm]
	#沉浸农艺
	#Whether all Farm and Charm cooking pot recipes are disabled
	#是否禁用沉浸农艺厨锅配方
	#When enabled, all Farm and Charm cooking pot recipes will not work
	cooking_pot_recipes_disabled = false
	#Whether Farm and Charm mod compatibility is enabled
	#是否启用沉浸农艺锅配方兼容
	farm_and_charm_compat_enabled = true

[vinery]
	#葡园酒香
	#Whether all Vinery fermentation barrel recipes are disabled
	#是否禁用葡园酒香酿造桶配方
	#When enabled, all Vinery fermentation barrel recipes will not work
	barrel_recipes_disabled = false

[little_maid]
	#车万女仆
	#Whether Little Maid mod compatibility is enabled
	#是否启用女仆任务拓展模块
	#When disabled, all Little Maid compatibility features will not be loaded
	little_maid_compat_enabled = true
	#Whether Little Maid chopping board task is enabled
	#是否启用女仆菜板任务
	#When enabled, maids can cut ingredients on the chopping board
	chopping_board_enabled = true
	#Whether Little Maid millstone task is enabled
	#是否启用女仆石磨任务
	#When enabled, maids can grind ingredients on the millstone
	millstone_enabled = true
	#Whether Little Maid pressing tub task is enabled
	#是否启用女仆果盘任务
	#When enabled, maids can press ingredients in the pressing tub
	pressing_tub_enabled = true

[spectrum]
	#光谱世界
	#Whether Spectrum mod compatibility is enabled
	#是否启用光谱世界兼容模块
	#When disabled, all Spectrum compatibility features will not be loaded
	spectrum_compat_enabled = true
	#Whether Spectrum pot item handler is enabled
	#是否启用炒锅节点传输
	#When enabled, Spectrum mod can interact with the pot via item handler
	pot_item_handler_enabled = true
	#Whether Spectrum chopping board item handler is enabled
	#是否启用切菜板节点传输
	#When enabled, Spectrum mod can interact with the chopping board via item handler
	chopping_board_item_handler_enabled = true
	#Whether Spectrum millstone item handler is enabled
	#是否启用石磨节点传输
	#When enabled, Spectrum mod can interact with the millstone via item handler
	millstone_item_handler_enabled = true
	#Whether Spectrum shawarma spit item handler is enabled
	#是否启用旋风烤肉塔节点传输
	#When enabled, Spectrum mod can interact with the shawarma spit via item handler
	shawarma_spit_item_handler_enabled = true
	#Whether Spectrum steamer item handler is enabled
	#是否启用蒸笼节点传输
	#When enabled, Spectrum mod can interact with the steamer via item handler
	steamer_item_handler_enabled = true
	#Whether Spectrum teapot item handler is enabled
	#是否启用茶壶节点传输
	#When enabled, Spectrum mod can interact with the teapot via item handler
	teapot_item_handler_enabled = true
	#Whether Spectrum trash can item handler is enabled
	#是否启用垃圾桶节点传输
	#When enabled, Spectrum mod can interact with the trash can via item handler
	trash_can_item_handler_enabled = true
	#Whether Spectrum pastel node pot oil compatibility is enabled
	#是否启用节点炒锅加油
	#When enabled, pastel nodes can add oil to pots
	pastel_node_compat_enabled = true

[create]
	#机械动力
	#Whether Create mod compatibility is enabled
	#是否启用机械动力兼容模块
	#When disabled, all Create compatibility features will not be loaded
	create_compat_enabled = true
	#Whether Create mechanical arm pot compatibility is enabled
	#是否启用机械动力动力臂炒锅兼容
	arm_pot_enabled = true
	#Whether Create mechanical arm stockpot compatibility is enabled
	#是否启用机械动力动力臂汤锅兼容
	arm_stockpot_enabled = true
	#Whether Create mechanical arm steamer compatibility is enabled
	#是否启用机械动力动力臂蒸笼兼容
	arm_steamer_enabled = true
	#Whether Create mechanical arm millstone compatibility is enabled
	#是否启用机械动力动力臂磨盘兼容
	arm_millstone_enabled = true
	#Whether Create mechanical arm shawarma spit compatibility is enabled
	#是否启用机械动力动力臂烤肉塔兼容
	arm_shawarma_spit_enabled = true
	#Whether Create mechanical arm teapot compatibility is enabled
	#是否启用机械动力动力臂茶壶兼容
	arm_teapot_enabled = true

[compat]
	#功能设置
	#Whether JEI compatibility is enabled
	#是否启用旋风烤肉塔JEI
	jei_compat_enabled = true
	#Whether Thirst mod compatibility is enabled
	#是否启用口渴兼容
	thirst_compat_enabled = true
	#Whether Quark sickle harvest fix is enabled
	#是否启用夸克兼容
	#When enabled, sickle items will not trigger Quark's automatic harvest
	quark_sickle_harvest_fix_enabled = true
