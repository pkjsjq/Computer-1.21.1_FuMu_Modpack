["Levitite Mining"]
	#If true, levitite and pearlescent_levitite can only be mined with a golden pickaxe.
	#Mining speed equals diamond pickaxe on obsidian. Efficiency enchantment has no effect.
	levititeGoldPickaxeOnly = true

["Redstone Spring"]
	#Stress capacity (SU) of the Redstone Spring output. Default 8.0 (same as torsion spring).
	# Default: 8.0
	# Range: 0.0 ~ 1024.0
	redstoneSpringStressCapacity = 8.0

["RCS Thruster"]
	#Fuel consumption of RCS Thruster in pN per mB per tick. Higher = more efficient. Default 5000.
	# Default: 5000.0
	# Range: 1.0 ~ 1000000.0
	rcsFuelConsumption = 5000.0

["Physics Anchor"]
	#Maximum chunk loading radius for the Physics Anchor (2 to this value). Default 5.
	# Default: 5
	# Range: 4 ~ 64
	maxAnchorRadius = 5
	#Tracking range in blocks for anchored SubLevels. Higher values prevent SubLevels from being removed by Sable when far away. Default 1024.
	# Default: 1024.0
	# Range: 64.0 ~ 1.7976931348623157E308
	anchorTrackingRange = 1024.0
